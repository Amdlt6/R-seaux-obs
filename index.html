<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Sécurisé OBS</title>
    <style>
        :root { --obs-red: #c61d23; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        .logo { max-width: 130px; margin-bottom: 25px; }
        h2 { font-size: 1.5em; color: var(--dark); margin-bottom: 8px; }
        p { color: #666; font-size: 0.9em; margin-bottom: 25px; }

        label { display: block; text-align: left; font-size: 0.85em; font-weight: bold; color: #444; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        
        button { background: var(--obs-red); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #a5181d; transform: translateY(-1px); }

        /* Carte de connexion finale */
        #wifiCard { display: none; margin-top: 10px; padding: 25px; border: 2px solid var(--obs-red); border-radius: 15px; background: #fff; text-align: left; }
        .wifi-header { font-weight: 800; color: var(--obs-red); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .vlan-badge { background: var(--obs-red); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.75em; }
        .label-small { color: #888; font-size: 0.7em; text-transform: uppercase; display: block; margin-top: 12px; }
        .val { font-family: 'Monaco', monospace; font-weight: bold; color: var(--dark); font-size: 1.15em; display: block; padding: 5px 0; }
        
        .rights-grid { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.8em; font-weight: 600; }
        
        #errorMsg { color: var(--obs-red); font-size: 0.85em; display: none; margin-bottom: 15px; font-weight: bold; background: #fff5f5; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <img src="images.jpeg" alt="Logo OBS" class="logo">
    
    <div id="authArea">
        <h2>Portail d'Assistance</h2>
        <p>Identifiez-vous pour récupérer vos paramètres.</p>

        <div id="errorMsg">⚠️ Code de catégorie incorrect.</div>

        <form id="obsSecureForm">
            <label for="userType">Sélectionnez votre profil</label>
            <select id="userType" required>
                <option value="" disabled selected>-- Choisir --</option>
                <option value="v10_compta">Comptabilité</option>
                <option value="v10_admin">Administration</option>
                <option value="v10_prof">Professeurs</option>
                <option value="v20">Élèves / Étudiants</option>
                <option value="v30">Locataires</option>
            </select>
            
            <label for="catPass">Code d'accès catégorie</label>
            <input type="password" id="catPass" placeholder="Entrez le code" required>
            
            <button type="submit">Afficher les accès</button>
        </form>
    </div>

    <div id="wifiCard">
        <div class="wifi-header">
            <span>CONFIG RÉSEAU</span>
            <span id="vlanTag" class="vlan-badge">VLAN --</span>
        </div>
        
        <span class="label-small">Réseau (SSID)</span>
        <span class="val" id="resBox">---</span>

        <span class="label-small">Clé de sécurité</span>
        <span class="val" id="resPass" style="color: #c61d23;">---</span>

        <div class="rights-grid">
            <span>Imprimante: <span id="resImp"></span></span>
            <span>Cloud: <span id="resCloud"></span></span>
        </div>
        
        <button onclick="window.location.reload()" style="background:#444; font-size: 11px; margin-top: 25px;">Nouvelle recherche</button>
    </div>
</div>

<script>
    document.getElementById('obsSecureForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const selection = document.getElementById('userType').value;
        const codeSaisi = document.getElementById('catPass').value.trim();
        const error = document.getElementById('errorMsg');

        // Base de données
        const networkDb = {
            'v10_compta': { key: 'Vlan10', ssid: 'Box_direction', pass: 'OBSdepuis2024', vlan: 'VLAN 10', p: '✅', c: '✅' },
            'v10_admin':   { key: 'Vlan10', ssid: 'Box_direction', pass: 'OBSdepuis2024', vlan: 'VLAN 10', p: '✅', c: '✅' },
            'v10_prof':    { key: 'Vlan10', ssid: 'Box_direction', pass: 'OBSdepuis2024', vlan: 'VLAN 10', p: '✅', c: '✅' },
            'v20':         { key: 'Vlan20', ssid: 'Box_élèves', pass: 'OBS100reussiteen2024', vlan: 'VLAN 20', p: '❌', c: '✅' },
            'v30':         { key: 'Vlan30', ssid: 'box_locataire', pass: 'Colocobs26', vlan: 'VLAN 30', p: '❌', c: '❌' }
        };

        const config = networkDb[selection];

        if (config && codeSaisi === config.key) {
            error.style.display = 'none';
            document.getElementById('authArea').style.display = 'none';
            
            document.getElementById('resBox').innerText = config.ssid;
            document.getElementById('resPass').innerText = config.pass;
            document.getElementById('vlanTag').innerText = config.vlan;
            document.getElementById('resImp').innerText = config.p;
            document.getElementById('resCloud').innerText = config.c;
            
            document.getElementById('wifiCard').style.display = 'block';
        } else {
            error.style.display = 'block';
        }
    });
</script>

</body>
</html>
